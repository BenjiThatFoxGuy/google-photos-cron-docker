name: Publish Docker Image

on:
  # Nightly build from main
  schedule:
    - cron: "0 0 * * *"    # 00:00 UTC every day

  # Tagged release (e.g. v1.0.0) and nightly builds on non-default branch pushes
  push:
    branches:
      - '**'
      - '!main'
    tags:
      - "v*"

  # Publish a nightly image on every PR push so changes can be tested
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

  # Allow ad-hoc runs from the Actions tab
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  gate:
    name: Evaluate trigger
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
    steps:
      - name: Decide whether this run should build
        id: decide
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;

            // Always allow manual/scheduled/tag builds.
            if (eventName === 'schedule' || eventName === 'workflow_dispatch') {
              core.setOutput('should_build', 'true');
              return;
            }

            if (eventName === 'pull_request') {
              const pr = context.payload.pull_request;
              const isSameRepo = pr?.head?.repo?.full_name === `${context.repo.owner}/${context.repo.repo}`;
              const targetsMain = pr?.base?.ref === 'main';
              core.setOutput('should_build', String(isSameRepo && targetsMain));
              return;
            }

            if (eventName === 'push') {
              const ref = context.ref || '';
              const isTag = ref.startsWith('refs/tags/');
              if (isTag) {
                core.setOutput('should_build', 'true');
                return;
              }

              const branch = ref.replace('refs/heads/', '');
              const head = `${context.repo.owner}:${branch}`;
              const { data: pulls } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head,
                per_page: 1,
              });

              // If this branch already has an open PR, prefer the pull_request
              // synchronize build and skip this push-triggered duplicate.
              core.setOutput('should_build', pulls.length > 0 ? 'false' : 'true');
              return;
            }

            core.setOutput('should_build', 'false');

  build-and-push:
    name: Build & push
    needs: gate
    if: needs.gate.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Nightly must always build from main.
          # For pull_request events, check out the PR head SHA so the built
          # source matches the commit-based build metadata in the image.
          ref: ${{ github.event_name == 'schedule' && 'refs/heads/main' || github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.ref }}

      # Set up QEMU so we can cross-compile for arm64.
      # Use mirror.gcr.io to avoid Docker Hub pull rate limits on GitHub runners.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          image: mirror.gcr.io/tonistiigi/binfmt:latest

      # Pull the BuildKit daemon image from the same mirror so the
      # docker-container driver does not hit Docker Hub either.
      # Configure mirror.gcr.io as a transparent mirror for docker.io so that
      # every FROM in the Dockerfile (golang:1.26-alpine, alpine:3.21, …) is
      # also served without hitting the Docker Hub rate-limit.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=mirror.gcr.io/moby/buildkit:buildx-stable-1
          config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive branch image tag
        id: branch_tag
        shell: bash
        run: |
          set -euo pipefail

          # Use PR head branch when running in pull_request events.
          branch_name="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-}}"

          # Sanitize branch name to a Docker tag-safe value.
          # - replace branch path separators ('/') with '__'
          # - keep only [a-z0-9._-]
          # - collapse repeated '-'
          # - trim leading/trailing separators
          # - cap length to avoid oversized tags
          branch_tag="$(printf '%s' "${branch_name}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's#/+#__#g; s/[[:space:]]+/-/g; s/[^a-z0-9._-]+/-/g; s/-+/-/g; s/^[._-]+//; s/[._-]+$//' \
            | cut -c1-120)"

          # Fallback for fully-sanitized-empty branch names.
          if [[ -z "${branch_tag}" ]]; then
            branch_tag="branch-${GITHUB_SHA::12}"
          fi

          is_non_standard_branch=false
          if [[ -n "${branch_name}" && "${branch_name}" != "main" && "${branch_name}" != "beta" ]]; then
            is_non_standard_branch=true
          fi

          echo "branch_name=${branch_name}" >> "$GITHUB_OUTPUT"
          echo "branch_tag=${branch_tag}" >> "$GITHUB_OUTPUT"
          echo "is_non_standard_branch=${is_non_standard_branch}" >> "$GITHUB_OUTPUT"

      # Derive image tags and OCI labels automatically:
      #   • schedule                                              → nightly
      #   • push of v1.2.3                                        → 1.2.3, 1.2, 1, latest
      #   • beta branch                                           → beta
      #   • non-standard branch (push or PR head branch)          → sanitized branch tag
      #   • workflow_dispatch fallback                            → sha-<short>
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Semver tags from a vX.Y.Z git tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # "latest" on any tag push
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            # "nightly" only on timed schedule
            type=raw,value=nightly,enable=${{ github.event_name == 'schedule' }}
            # Publish a static beta tag for beta branch builds
            type=raw,value=beta,enable=${{ steps.branch_tag.outputs.branch_name == 'beta' }}
            # Publish sanitized branch-name tags for non-standard branches
            type=raw,value=${{ steps.branch_tag.outputs.branch_tag }},enable=${{ steps.branch_tag.outputs.is_non_standard_branch == 'true' }}
            # Ensure workflow_dispatch always has at least one tag
            type=sha,prefix=sha-,format=short,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DOCKER_BRANCH=${{ steps.branch_tag.outputs.branch_tag }}
            DOCKER_COMMIT=${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          # Layer cache speeds up repeat builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
