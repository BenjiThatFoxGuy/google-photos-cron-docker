name: Publish Docker Image

on:
  # Nightly build from main
  schedule:
    - cron: "0 0 * * *"    # 00:00 UTC every day

  # Tagged release (e.g. v1.0.0) and nightly builds on non-default branch pushes
  push:
    branches:
      - '**'
      - '!main'
    tags:
      - "v*"

  # Publish a nightly image on every PR push so changes can be tested
  pull_request:

  # Allow ad-hoc runs from the Actions tab
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up QEMU so we can cross-compile for arm64.
      # Use mirror.gcr.io to avoid Docker Hub pull rate limits on GitHub runners.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          image: mirror.gcr.io/tonistiigi/binfmt:latest

      # Pull the BuildKit daemon image from the same mirror so the
      # docker-container driver does not hit Docker Hub either.
      # Configure mirror.gcr.io as a transparent mirror for docker.io so that
      # every FROM in the Dockerfile (golang:1.26-alpine, alpine:3.21, …) is
      # also served without hitting the Docker Hub rate-limit.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=mirror.gcr.io/moby/buildkit:buildx-stable-1
          config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive image tags and OCI labels automatically:
      #   • nightly schedule / workflow_dispatch / pull_request  → nightly
      #   • push of v1.2.3                                       → 1.2.3, 1.2, 1, latest
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Semver tags from a vX.Y.Z git tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # "latest" on any tag push
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            # "nightly" on schedule, manual dispatch, PR push, or non-default branch push
            type=raw,value=nightly,enable=${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')) }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache speeds up repeat builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
