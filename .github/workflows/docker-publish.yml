name: Publish Docker Image

on:
  # Nightly build from main
  schedule:
    - cron: "0 0 * * *"    # 00:00 UTC every day

  # Tagged release (e.g. v1.0.0)
  push:
    tags:
      - "v*"

  # Allow ad-hoc runs from the Actions tab
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up QEMU so we can cross-compile for arm64
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive image tags and OCI labels automatically:
      #   • nightly schedule / workflow_dispatch  → nightly
      #   • push of v1.2.3                        → 1.2.3, 1.2, 1, latest
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Semver tags from a vX.Y.Z git tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # "latest" on any tag push
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            # "nightly" on schedule or manual dispatch
            type=raw,value=nightly,enable=${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache speeds up repeat builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
